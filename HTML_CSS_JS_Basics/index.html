<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML CSS JS Basics Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      line-height: 1.4;
    }
    button {
      padding: 0.6rem 1rem;
      cursor: pointer;
    }
    .card {
      margin-top: 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1rem;
      max-width: 600px;
      background: #fafafa;
    }
    ul {
      margin: 0.4rem 0 0;
      padding-left: 1.2rem;
    }
  </style>
</head>
<body>
  <h1>Fetch API + DOM Manipulation</h1>
  <p>Click the button to fetch todos from JSONPlaceholder.</p>

  <button id="load-btn">Load Todos</button>
  <div id="result" class="card">No data loaded yet.</div>

  <script>
    const loadButton = document.getElementById("load-btn");
    const resultContainer = document.getElementById("result");

    const renderTodos = (todos) => {
      const listItems = todos
        .map((todo) => `<li>${todo.title}</li>`)
        .join("");
      resultContainer.innerHTML = `<h3>Top 5 Todos</h3><ul>${listItems}</ul>`;
    };

    const loadTodos = async () => {
      resultContainer.textContent = "Loading...";
      try {
        const response = await fetch("https://jsonplaceholder.typicode.com/todos?_limit=5");
        const todos = await response.json();
        renderTodos(todos);
      } catch (error) {
        resultContainer.textContent = `Failed to load data: ${error.message}`;
      }
    };

    loadButton.addEventListener("click", loadTodos);
  </script>
</body>
</html>
