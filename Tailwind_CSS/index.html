<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tailwind CSS Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
  <div class="flex flex-col md:flex-row min-h-screen">
    <aside class="w-full md:w-64 bg-slate-900 text-white p-6">
      <h1 class="text-2xl font-bold mb-6">VoltStream</h1>
      <nav class="space-y-3">
        <a class="block p-2 rounded hover:bg-slate-700" href="#">Dashboard</a>
        <a class="block p-2 rounded hover:bg-slate-700" href="#">Analytics</a>
        <a class="block p-2 rounded hover:bg-slate-700" href="#">Devices</a>
        <a class="block p-2 rounded hover:bg-slate-700" href="#">Billing</a>
      </nav>
    </aside>
    <main class="flex-1 p-6">
      <h2 class="text-3xl font-semibold text-slate-800 mb-4">Responsive Tailwind Layout</h2>
      <p class="text-slate-600 mb-6">
        This section demonstrates utility classes for spacing, colors, flexbox, and responsiveness.
      </p>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="bg-white rounded-xl shadow p-4">Card 1</div>
        <div class="bg-white rounded-xl shadow p-4">Card 2</div>
        <div class="bg-white rounded-xl shadow p-4">Card 3</div>
      </div>
    </main>
  </div>
</body>
</html>
